name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- Job 1 : Build & Push ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-tp:latest

  # --- Job 2 : Deploiement sur EC2  ---
  deploy:
    runs-on: ubuntu-latest
    needs: build   # S'exécute uniquement si le build réussit

    steps:
      - name: Déploiement sur EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}       # Elastic IP
          username: ${{ secrets.EC2_USER }}       # ubuntu
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-tp:latest
            docker stop devops-app || true
            docker rm   devops-app || true
            docker run -d \
              --name devops-app \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/devops-tp:latest
            echo "Déploiement réussi - $(date)"